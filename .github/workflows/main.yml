name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK
        uses: kivy/buildozer-action@v1
        with:
          command: buildozer android debug
          target: android
          arch: arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sauna-monitor-apk
          path: bin/*.apk
