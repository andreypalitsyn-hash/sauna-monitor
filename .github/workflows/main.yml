name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer

      - name: Install Android SDK (build-tools, NDK)
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools tools
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/tools/bin
          echo y | sdkmanager --licenses
          sdkmanager "build-tools;33.0.0" "platforms;android-33" "ndk;23.1.7779620"
        env:
          ANDROID_SDK_ROOT: $HOME/android-sdk

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROID_SDK_ROOT: $HOME/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sauna-monitor-apk
          path: bin/*.apk
